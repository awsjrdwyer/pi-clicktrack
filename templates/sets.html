{% extends "base.html" %}

{% block title %}Sets - Click Track Player{% endblock %}
{% block nav_sets %}active{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1>Set Library</h1>
    <button class="btn" onclick="openAddSetModal()">Add Set</button>
</div>

<div id="setsContainer">
    <!-- Sets will be populated here -->
</div>

<!-- Add/Edit Set Modal -->
<div id="setModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Add Set</h2>
            <span class="close" onclick="closeSetModal()">&times;</span>
        </div>
        
        <form id="setForm" onsubmit="saveSet(event)">
            <input type="hidden" id="setId" value="">
            
            <div class="form-group">
                <label for="setName">Set Name *</label>
                <input type="text" id="setName" required>
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeSetModal()">Cancel</button>
                <button type="submit" class="btn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Song to Set Modal -->
<div id="addSongModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add Song to Set</h2>
            <span class="close" onclick="closeAddSongModal()">&times;</span>
        </div>
        
        <input type="hidden" id="targetSetId" value="">
        
        <div class="form-group">
            <label for="songSelect">Select Song *</label>
            <select id="songSelect" required>
                <option value="">-- Select a song --</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button type="button" class="btn btn-secondary" onclick="closeAddSongModal()">Cancel</button>
            <button type="button" class="btn" onclick="addSongToSet()">Add</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_styles %}
<style>
    .set-card {
        background: #2a2a2a;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
    }
    
    .set-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #333;
    }
    
    .set-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #fff;
    }
    
    .set-actions {
        display: flex;
        gap: 0.5rem;
    }
    
    .song-list {
        list-style: none;
    }
    
    .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: #333;
        border-radius: 4px;
        cursor: grab;
        transition: background 0.2s, opacity 0.2s, border 0.2s;
        border: 2px solid transparent;
    }
    
    .song-item:active {
        cursor: grabbing;
    }
    
    .song-item.dragging {
        opacity: 0.4;
    }
    
    .song-item.drag-over {
        border: 2px solid #4CAF50;
        background: #3a3a3a;
    }
    
    .drag-handle {
        color: #666;
        margin-right: 0.75rem;
        font-size: 1.2rem;
        cursor: grab;
    }
    
    .song-info {
        flex: 1;
    }
    
    .song-title {
        font-weight: 500;
        margin-bottom: 0.25rem;
    }
    
    .song-details {
        font-size: 0.9rem;
        color: #999;
    }
    
    .empty-set {
        text-align: center;
        padding: 2rem;
        color: #666;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
        .set-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.75rem;
        }
        
        .set-actions {
            width: 100%;
            justify-content: flex-start;
        }
        
        .song-item {
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .song-details {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}

{% block extra_scripts %}
<script>
    let sets = [];
    let songs = [];
    
    // Load sets and songs on page load
    async function loadData() {
        await Promise.all([loadSets(), loadSongs()]);
        renderSets();
    }
    
    async function loadSets() {
        try {
            const response = await fetch('api/sets');
            sets = await response.json();
        } catch (error) {
            console.error('Error loading sets:', error);
            alert('Failed to load sets');
        }
    }
    
    async function loadSongs() {
        try {
            const response = await fetch('api/songs');
            songs = await response.json();
        } catch (error) {
            console.error('Error loading songs:', error);
        }
    }
    
    function renderSets() {
        const container = document.getElementById('setsContainer');
        
        if (sets.length === 0) {
            container.innerHTML = '<div class="set-card"><div class="empty-set">No sets yet. Click "Add Set" to create one.</div></div>';
            return;
        }
        
        container.innerHTML = sets.map(set => {
            const setSongs = set.songs.map(songId => songs.find(s => s.id === songId)).filter(s => s);
            
            return `
                <div class="set-card">
                    <div class="set-header">
                        <div class="set-title">${escapeHtml(set.name)}</div>
                        <div class="set-actions">
                            <button class="btn btn-small" onclick="openAddSongToSetModal('${set.id}')">Add Song</button>
                            <button class="btn btn-small btn-secondary" onclick="editSet('${set.id}')">Edit</button>
                            <button class="btn btn-small btn-danger" onclick="deleteSet('${set.id}')">Delete</button>
                        </div>
                    </div>
                    <ul class="song-list">
                        ${setSongs.length === 0 ? '<div class="empty-set">No songs in this set yet.</div>' : 
                          setSongs.map((song, index) => `
                            <li class="song-item" data-index="${index}" draggable="true" ondragstart="dragStart(event, '${set.id}', ${index})" ondragover="dragOver(event)" ondrop="drop(event, '${set.id}', ${index})" ondragend="dragEnd(event)">
                                <div class="drag-handle">&#x2630;</div>
                                <div class="song-info">
                                    <div class="song-title">${index + 1}. ${escapeHtml(song.title)}</div>
                                    <div class="song-details">
                                        ${song.bpm} BPM • ${song.timeSignature.beatsPerMeasure}/${song.timeSignature.noteValue} • 
                                        ${song.subdivision === 'single' ? 'Single' : 'Double'} time
                                    </div>
                                </div>
                                <button class="btn btn-small btn-danger" onclick="removeSongFromSet('${set.id}', '${song.id}', ${index})">Remove</button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }).join('');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function openAddSetModal() {
        document.getElementById('modalTitle').textContent = 'Add Set';
        document.getElementById('setForm').reset();
        document.getElementById('setId').value = '';
        document.getElementById('setModal').classList.add('active');
    }
    
    function editSet(setId) {
        const set = sets.find(s => s.id === setId);
        if (!set) return;
        
        document.getElementById('modalTitle').textContent = 'Edit Set';
        document.getElementById('setId').value = set.id;
        document.getElementById('setName').value = set.name;
        document.getElementById('setModal').classList.add('active');
    }
    
    function closeSetModal() {
        document.getElementById('setModal').classList.remove('active');
    }
    
    async function saveSet(event) {
        event.preventDefault();
        
        const setId = document.getElementById('setId').value;
        const setData = {
            name: document.getElementById('setName').value
        };
        
        try {
            let response;
            if (setId) {
                // Update existing set
                response = await fetch(`api/sets/${setId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(setData)
                });
            } else {
                // Create new set
                response = await fetch('api/sets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(setData)
                });
            }
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to save set');
            }
            
            closeSetModal();
            await loadData();
        } catch (error) {
            console.error('Error saving set:', error);
            alert('Failed to save set: ' + error.message);
        }
    }
    
    async function deleteSet(setId) {
        if (!confirm('Are you sure you want to delete this set?')) {
            return;
        }
        
        try {
            const response = await fetch(`api/sets/${setId}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                throw new Error('Failed to delete set');
            }
            
            await loadData();
        } catch (error) {
            console.error('Error deleting set:', error);
            alert('Failed to delete set');
        }
    }
    
    function openAddSongToSetModal(setId) {
        document.getElementById('targetSetId').value = setId;
        
        // Populate song select
        const select = document.getElementById('songSelect');
        select.innerHTML = '<option value="">-- Select a song --</option>' +
            songs.map(song => `<option value="${song.id}">${escapeHtml(song.title)}</option>`).join('');
        
        document.getElementById('addSongModal').classList.add('active');
    }
    
    function closeAddSongModal() {
        document.getElementById('addSongModal').classList.remove('active');
    }
    
    async function addSongToSet() {
        const setId = document.getElementById('targetSetId').value;
        const songId = document.getElementById('songSelect').value;
        
        if (!songId) {
            alert('Please select a song');
            return;
        }
        
        try {
            const response = await fetch(`api/sets/${setId}/songs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ songId })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Failed to add song to set');
            }
            
            closeAddSongModal();
            await loadData();
        } catch (error) {
            console.error('Error adding song to set:', error);
            alert('Failed to add song to set: ' + error.message);
        }
    }
    
    async function removeSongFromSet(setId, songId, songIndex) {
        if (!confirm('Remove this song from the set?')) {
            return;
        }
        
        try {
            const response = await fetch(`api/sets/${setId}/songs/${songId}?index=${songIndex}`, {
                method: 'DELETE'
            });
            
            if (!response.ok) {
                throw new Error('Failed to remove song from set');
            }
            
            await loadData();
        } catch (error) {
            console.error('Error removing song from set:', error);
            alert('Failed to remove song from set');
        }
    }
    
    // Drag and drop reordering
    let dragSetId = null;
    let dragFromIndex = null;
    
    function dragStart(event, setId, index) {
        dragSetId = setId;
        dragFromIndex = index;
        event.dataTransfer.effectAllowed = 'move';
        event.target.classList.add('dragging');
    }
    
    function dragOver(event) {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';
        const item = event.target.closest('.song-item');
        if (item) {
            // Remove drag-over from all items first
            document.querySelectorAll('.song-item.drag-over').forEach(el => el.classList.remove('drag-over'));
            item.classList.add('drag-over');
        }
    }
    
    function dragEnd(event) {
        event.target.classList.remove('dragging');
        document.querySelectorAll('.song-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    }
    
    async function drop(event, setId, toIndex) {
        event.preventDefault();
        document.querySelectorAll('.song-item.drag-over').forEach(el => el.classList.remove('drag-over'));
        
        if (dragSetId !== setId || dragFromIndex === null || dragFromIndex === toIndex) return;
        
        const set = sets.find(s => s.id === setId);
        if (!set) return;
        
        // Reorder locally
        const newSongs = [...set.songs];
        const [moved] = newSongs.splice(dragFromIndex, 1);
        newSongs.splice(toIndex, 0, moved);
        
        try {
            const response = await fetch(`api/sets/${setId}/reorder`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ songs: newSongs })
            });
            
            if (!response.ok) throw new Error('Failed to reorder songs');
            
            await loadData();
        } catch (error) {
            console.error('Error reordering songs:', error);
            alert('Failed to reorder songs');
        }
        
        dragSetId = null;
        dragFromIndex = null;
    }
    
    // WebSocket event handlers
    function onSetUpdated(set) {
        loadData();
    }
    
    function onSetDeleted(setId) {
        loadData();
    }
    
    function onSongUpdated(song) {
        loadData();
    }
    
    function onSongDeleted(songId) {
        loadData();
    }
    
    // Load data on page load
    loadData();
</script>
{% endblock %}
